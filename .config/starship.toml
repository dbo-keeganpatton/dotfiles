add_newline = true
command_timeout = 200
format = " [$directory$git_branch$git_status]($style)($python) $character "

[character]
error_symbol = "[!!](bold #f3bce6)"
success_symbol = '[\$](bold #D100D1)'

[directory]
style = '#CFCFCF'
truncation_length = 2
truncation_symbol = "⟡ "
repo_root_style = "#D100D1"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style)"

[python]
format = '[(${virtualenv})]($italic #808080)'

[git_branch]
format = " \\[$branch\\]($style) "
style = "italic #6E6E6E"

[git_status]
format     = '[$all_status]($style)'
style      = "#f3bce6"
ahead      = "⇡${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
behind     = "⇣${count} "
conflicted = " "
up_to_date = " "
untracked  = "? "
modified   = " "
stashed    = ""
staged     = ""
renamed    = ""
deleted    = ""
